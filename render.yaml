services:
  - type: web
    name: ci4u-brains-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build:api
    startCommand: node scripts/require-api-production-env.mjs && npm run prisma:migrate:deploy && npm run start:api
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CI4U_REPOSITORY
        value: prisma
      - key: CI4U_DATA_SCOPE
        value: production
      - key: CI4U_AUTH_MODE
        value: supabase
      - key: CI4U_ALLOW_DEV_AUTH_IN_PRODUCTION
        value: "false"
      - key: CI4U_WEB_ORIGINS
        value: https://ci4u-brains.vercel.app,https://ci4u-brains-mohd927292s-projects.vercel.app,https://ci4u-brains-git-main-mohd927292s-projects.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: CI4U_SUPABASE_URL
        value: https://klvtjuejpogylqkkdkqx.supabase.co
      - key: CI4U_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_mnlSoTHUbDpR5DD0afZHeg_9YhkeuFE
      - key: CI4U_SUPABASE_ANON_KEY
        sync: false
      - key: CI4U_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CI4U_FOUNDER_EMAIL
        value: syedci4u@gmail.com
      - key: CI4U_AUTH_INVITE_REDIRECT_URL
        value: https://ci4u-brains.vercel.app
      - key: CI4U_AUTH_JWKS_URL
        sync: false
      - key: CI4U_AUTH_ISSUER
        sync: false
      - key: CI4U_AUTH_AUDIENCE
        sync: false
