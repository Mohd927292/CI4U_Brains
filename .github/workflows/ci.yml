name: CI4U Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full quality gate
        run: npm run check:all

      - name: Check deployment guard config
        run: npm run check:deployment
